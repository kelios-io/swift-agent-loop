name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: macos-15
            swift: "6.0"
            xcode: "16.2"
          - os: macos-15
            swift: "6.1"
            xcode: "16.3"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (${{ matrix.xcode }})
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test
